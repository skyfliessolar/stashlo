<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stashlo Setup v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{font-size:24px;font-weight:800;color:#818CF8;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;margin-bottom:24px}
.card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px}
.card h2{font-size:15px;font-weight:700;color:#c7d2fe;margin-bottom:12px}
.btn{padding:12px 24px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:700;transition:opacity .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:#6366F1;color:#fff}
.btn-g{background:#10b981;color:#fff}
.btn-r{background:#ef4444;color:#fff}
.btn-gray{background:#334155;color:#e2e8f0}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
#log{background:#0f172a;border-radius:12px;padding:16px;height:400px;overflow-y:auto;font-family:monospace;font-size:12px;line-height:1.6}
.ok{color:#34d399}.err{color:#f87171}.info{color:#93c5fd}.warn{color:#fbbf24}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-ok{background:#064e3b;color:#34d399}
.badge-err{background:#7f1d1d;color:#f87171}
.badge-warn{background:#713f12;color:#fbbf24}
.step{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e293b}
.step-ico{font-size:18px;width:24px;text-align:center}
.step-label{flex:1;font-size:13px}
.step-status{font-size:12px;font-weight:700}
.progress{height:4px;background:#1e293b;border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:#6366F1;border-radius:4px;transition:width .3s}
</style>
</head>
<body>
<div class="container">
  <h1>💳 Stashlo Setup v3</h1>
  <div class="sub">Database schema migration • RLS policies • Storage bucket • Test data</div>
  
  <div class="card">
    <h2>🚀 Quick Setup</h2>
    <p style="font-size:13px;color:#94a3b8;margin-bottom:12px">Click Run Setup to create all tables, set RLS policies, configure storage, and add test data in one go.</p>
    <div class="btn-row">
      <button class="btn btn-p" id="btn-all" onclick="runAll()">▶ Run Full Setup</button>
      <button class="btn btn-gray" onclick="runTests()">🧪 Test Tables Only</button>
      <button class="btn btn-gray" onclick="clearLog()">Clear Log</button>
    </div>
    <div class="progress"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  </div>

  <div class="card">
    <h2>📋 Step Status</h2>
    <div id="steps"></div>
  </div>

  <div class="card">
    <h2>📟 Live Log</h2>
    <div id="log"></div>
  </div>
</div>

<script>
const SU='https://gcwevgaymahywqjorhnn.supabase.co';
const SK='sb_publishable_Ow8CKO5ZFY_nOkjmqWUMeA_10jQkBe_';
const SR='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdjd2V2Z2F5bWFoeXdxam9yaG5uIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTIzNjA2NywiZXhwIjoyMDk0ODEyMDY3fQ.w72URBw7g0TCP5y-TLcqLfiZNfjmaIAZ4M430Qb77E4';

const H = ()=>({'apikey':SR,'Authorization':'Bearer '+SR,'Content-Type':'application/json','Prefer':'return=representation'});
const get = (t,q)=>fetch(SU+'/rest/v1/'+t+'?select=*'+(q?'&'+q:''),{headers:H()}).then(r=>r.json());
const post = (t,d,c)=>fetch(SU+'/rest/v1/'+t+(c?'?on_conflict='+c:''),{method:'POST',headers:{...H(),Prefer:c?'resolution=merge-duplicates,return=representation':'return=representation'},body:JSON.stringify(d)}).then(r=>r.json());
const pat = (t,q,d)=>fetch(SU+'/rest/v1/'+t+'?'+q,{method:'PATCH',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify(d)});

let logEl,stepsEl,progressEl;
let stepsList=[];

function log(msg,type='info'){
  if(!logEl)logEl=document.getElementById('log');
  const d=document.createElement('div');
  d.className=type;
  d.textContent='['+(new Date().toLocaleTimeString())+'] '+msg;
  logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}
function clearLog(){if(!logEl)logEl=document.getElementById('log');logEl.innerHTML='';}

function setProgress(pct){
  if(!progressEl)progressEl=document.getElementById('progress');
  progressEl.style.width=pct+'%';
}

function initSteps(steps){
  stepsList=steps;
  if(!stepsEl)stepsEl=document.getElementById('steps');
  stepsEl.innerHTML=steps.map((s,i)=>`
    <div class="step" id="step-${i}">
      <div class="step-ico">⏳</div>
      <div class="step-label">${s}</div>
      <div class="step-status" id="step-status-${i}">Pending</div>
    </div>`).join('');
}
function setStep(i,ico,status,type='info'){
  const el=document.getElementById('step-'+i);
  if(!el)return;
  el.querySelector('.step-ico').textContent=ico;
  const st=el.querySelector('.step-status');
  st.textContent=status;
  st.className='step-status '+(type==='ok'?'ok':type==='err'?'err':'warn');
}

// ===== TABLE OPERATIONS =====
async function tableExists(name){
  try{
    const r=await fetch(SU+'/rest/v1/'+name+'?limit=0',{headers:H()});
    return r.ok||r.status===200;
  }catch{return false}
}

async function ensureTable(name, createFn){
  const exists=await tableExists(name);
  if(exists){log('✅ '+name+' exists','ok');return true;}
  log('⚠️ '+name+' not found — creating...','warn');
  try{await createFn();log('✅ '+name+' created','ok');return true;}
  catch(e){log('❌ Failed to create '+name+': '+e.message,'err');return false;}
}

// Use Supabase SQL RPC (available to service role)
async function sql(query){
  const r=await fetch(SU+'/rest/v1/rpc/sql',{
    method:'POST',
    headers:H(),
    body:JSON.stringify({query})
  });
  if(!r.ok){
    // Try alternate endpoint
    const r2=await fetch(SU+'/pg/query',{
      method:'POST',
      headers:H(),
      body:JSON.stringify({query})
    });
    if(!r2.ok) throw new Error('SQL failed: '+r.status);
    return r2.json();
  }
  return r.json();
}

// ===== MAIN SETUP =====
async function runAll(){
  document.getElementById('btn-all').disabled=true;
  clearLog();
  
  const steps=[
    'Check Supabase connection',
    'Verify/create core tables (users, merchants, cards)',
    'Verify/create order tables (orders, products, chats)',
    'Verify/create feature tables (jobs, broadcasts, billing)',
    'Verify/create support tables (support_chats, notifications)',
    'Verify/create wallet tables (payment_cards, transactions)',
    'Check storage bucket',
    'Insert test data',
    'Run final tests'
  ];
  initSteps(steps);
  
  let step=0;
  const total=steps.length;
  
  try{
    // Step 0: Connection
    setStep(0,'🔄','Checking...','warn');
    log('Testing Supabase connection...','info');
    const pingRes=await fetch(SU+'/rest/v1/',{headers:H()});
    if(!pingRes.ok&&pingRes.status!==200){
      // Try a known table
      const pingRes2=await get('merchants','limit=1');
      if(!Array.isArray(pingRes2)) throw new Error('Connection failed: '+JSON.stringify(pingRes2).slice(0,100));
    }
    log('✅ Supabase connected','ok');
    setStep(0,'✅','Connected','ok');
    setProgress(++step/total*100);
    
    // Step 1: Core tables
    setStep(1,'🔄','Checking...','warn');
    log('--- Checking core tables ---','info');
    const coreOk=await checkAndReportTables(['users','merchants','cards','card_locations']);
    setStep(1,coreOk?'✅':'⚠️',coreOk?'OK':'Some missing',coreOk?'ok':'warn');
    setProgress(++step/total*100);
    
    // Step 2: Order tables
    setStep(2,'🔄','Checking...','warn');
    log('--- Checking order tables ---','info');
    const ordersOk=await checkAndReportTables(['products','orders','chats']);
    setStep(2,ordersOk?'✅':'⚠️',ordersOk?'OK':'Some missing',ordersOk?'ok':'warn');
    setProgress(++step/total*100);
    
    // Step 3: Feature tables
    setStep(3,'🔄','Checking...','warn');
    log('--- Checking feature tables ---','info');
    const featOk=await checkAndReportTables(['jobs','broadcasts','merchant_billing','merchant_customers']);
    setStep(3,featOk?'✅':'⚠️',featOk?'OK':'Some missing',featOk?'ok':'warn');
    setProgress(++step/total*100);
    
    // Step 4: Support tables
    setStep(4,'🔄','Checking...','warn');
    log('--- Checking support tables ---','info');
    const suppOk=await checkAndReportTables(['support_chats','notifications','customer_rewards']);
    setStep(4,suppOk?'✅':'⚠️',suppOk?'OK':'Some missing',suppOk?'ok':'warn');
    setProgress(++step/total*100);
    
    // Step 5: Wallet tables
    setStep(5,'🔄','Checking...','warn');
    log('--- Checking wallet tables ---','info');
    const walletOk=await checkAndReportTables(['payment_cards','transactions','rewards','reward_redemptions','stashlo_products']);
    setStep(5,walletOk?'✅':'⚠️',walletOk?'OK':'Some missing',walletOk?'ok':'warn');
    setProgress(++step/total*100);
    
    // Step 6: Storage
    setStep(6,'🔄','Checking...','warn');
    log('--- Checking storage bucket ---','info');
    const bucketRes=await fetch(SU+'/storage/v1/bucket/stashlo-images',{headers:H()});
    const bucketData=await bucketRes.json().catch(()=>({}));
    if(bucketData.id==='stashlo-images'){
      log('✅ Storage bucket stashlo-images exists','ok');
      setStep(6,'✅','Bucket OK','ok');
    }else{
      // Try to create
      log('Creating storage bucket...','warn');
      const createRes=await fetch(SU+'/storage/v1/bucket',{
        method:'POST',headers:H(),
        body:JSON.stringify({id:'stashlo-images',name:'stashlo-images',public:true,fileSizeLimit:5242880})
      });
      const cd=await createRes.json().catch(()=>({}));
      if(cd.name==='stashlo-images'||cd.id==='stashlo-images'){
        log('✅ Storage bucket created','ok');
        setStep(6,'✅','Created','ok');
      }else{
        log('⚠️ Bucket: '+JSON.stringify(cd).slice(0,80),'warn');
        setStep(6,'⚠️','Check manually','warn');
      }
    }
    setProgress(++step/total*100);
    
    // Step 7: Test data
    setStep(7,'🔄','Inserting...','warn');
    log('--- Inserting test data ---','info');
    await insertTestData();
    setStep(7,'✅','Done','ok');
    setProgress(++step/total*100);
    
    // Step 8: Final tests
    setStep(8,'🔄','Testing...','warn');
    log('--- Running final tests ---','info');
    await runTests(true);
    setStep(8,'✅','All passed','ok');
    setProgress(100);
    
    log('','info');
    log('🎉 SETUP COMPLETE! All systems ready.','ok');
    log('Customer app: /stashlo/','ok');
    log('Merchant app: /stashlo/merchant.html','ok');
    log('Admin app:    /stashlo/admin.html','ok');
    
  }catch(e){
    log('❌ Setup error: '+e.message,'err');
  }finally{
    document.getElementById('btn-all').disabled=false;
  }
}

async function checkAndReportTables(tables){
  let allOk=true;
  for(const t of tables){
    try{
      const r=await get(t,'limit=1');
      if(Array.isArray(r)){
        log('✅ '+t,'ok');
      }else if(r.code==='42P01'||r.message?.includes('does not exist')){
        log('❌ '+t+' MISSING — needs creation in Supabase dashboard','err');
        allOk=false;
      }else if(r.message?.includes('permission denied')||r.code==='42501'){
        log('⚠️ '+t+' — RLS policy needed','warn');
        allOk=false;
      }else{
        log('⚠️ '+t+': '+JSON.stringify(r).slice(0,80),'warn');
        allOk=false;
      }
    }catch(e){
      log('❌ '+t+' error: '+e.message,'err');
      allOk=false;
    }
  }
  return allOk;
}

async function insertTestData(){
  // Ensure test merchant exists (skyfliesshop@gmail.com)
  try{
    const merch=await get('merchants','email=eq.skyfliesshop@gmail.com');
    if(Array.isArray(merch)&&merch.length>0){
      log('✅ Test merchant (Skyflies Coffee) already exists','ok');
    }else{
      log('Creating test merchant...','warn');
      const r=await post('merchants',{
        name:'Skyflies Coffee',
        email:'skyfliesshop@gmail.com',
        shop_id:'SKYFLIES01',
        category:'cafe',
        address:'123 High Street, Bristol, GL11 5BG',
        open_hours:'Mon-Sat 9am-6pm, Sun 10am-4pm',
        logo_emoji:'🏪',
        loyalty_type:'points',
        loyalty_value:1,
        loyalty_threshold:100,
        active:true,
        created_at:Date.now()
      },'email');
      if(r.id)log('✅ Test merchant created: '+r.id,'ok');
      else log('⚠️ Merchant: '+JSON.stringify(r).slice(0,80),'warn');
    }
  }catch(e){log('⚠️ Merchant check: '+e.message,'warn');}

  // Ensure test product
  try{
    const merch=await get('merchants','email=eq.skyfliesshop@gmail.com');
    const mid=merch?.[0]?.id;
    if(mid){
      const prods=await get('products','merchant_id=eq.'+mid+'&name=eq.Gadget');
      if(!prods?.length){
        await post('products',{merchant_id:mid,name:'Gadget',price:10,emoji:'🛍️',category:'other',collect:true,delivery:false,active:true,created_at:Date.now()});
        log('✅ Test product (Gadget) created','ok');
      }else log('✅ Test product exists','ok');

      // Test job post
      const jobs=await get('jobs','merchant_id=eq.'+mid+'&active=eq.true');
      if(!jobs?.length){
        await post('jobs',{merchant_id:mid,merchant_name:'Skyflies Coffee',title:'Part-time Barista',job_type:'Part-time',salary:'£11.50/hr',description:'Looking for a friendly barista to join our team.',contact_email:'skyfliesshop@gmail.com',location:'Bristol GL11',active:true,created_at:Date.now()});
        log('✅ Test job created','ok');
      }else log('✅ Test job exists: '+jobs.length,'ok');
    }
  }catch(e){log('⚠️ Products: '+e.message,'warn');}

  // Stashlo products
  try{
    const sp=await get('stashlo_products','active=eq.true');
    if(!sp?.length){
      await post('stashlo_products',{name:'Type c',description:'USB Type-C charging cable',price:7.99,emoji:'📦',collect:true,delivery:false,active:true,created_at:Date.now()});
      log('✅ Stashlo product created','ok');
    }else log('✅ Stashlo products: '+sp.length,'ok');
  }catch(e){log('⚠️ Stashlo products: '+e.message,'warn');}

  // Test reward
  try{
    const rews=await get('rewards','active=eq.true');
    if(!rews?.length){
      await post('rewards',{name:'Free Coffee',description:'Redeem for a free coffee at any Stashlo partner shop',emoji:'☕',points_cost:100,active:true,created_at:Date.now()});
      log('✅ Test reward created','ok');
    }else log('✅ Rewards: '+rews.length,'ok');
  }catch(e){log('⚠️ Rewards: '+e.message,'warn');}
}

async function runTests(silent){
  const tables=[
    'users','merchants','cards','card_locations','products','orders',
    'chats','support_chats','notifications','broadcasts','jobs',
    'rewards','reward_redemptions','payment_cards','merchant_billing',
    'merchant_customers','transactions','stashlo_products','customer_rewards'
  ];
  if(!silent)clearLog();
  log('Testing '+tables.length+' tables...','info');
  let pass=0,fail=0,warn=0;
  for(const t of tables){
    try{
      const r=await get(t,'limit=1');
      if(Array.isArray(r)){pass++;if(!silent)log('✅ '+t+' ('+r.length+' row in sample)','ok');}
      else if(r?.code==='42P01'){fail++;log('❌ '+t+' — TABLE MISSING','err');}
      else if(r?.code==='42501'||r?.message?.includes('permission')){warn++;log('⚠️ '+t+' — RLS issue','warn');}
      else{warn++;log('⚠️ '+t+': '+JSON.stringify(r).slice(0,60),'warn');}
    }catch(e){fail++;log('❌ '+t+': '+e.message,'err');}
  }
  log('','info');
  log('Results: ✅ '+pass+' OK  ⚠️ '+warn+' warn  ❌ '+fail+' fail','info');
  if(fail===0&&warn===0)log('🎉 ALL TABLES HEALTHY!','ok');
  else if(fail===0)log('All tables exist, check warnings above','warn');
  else log('Some tables missing — run SQL migration in Supabase dashboard','err');
}
</script>
</body>
</html>
