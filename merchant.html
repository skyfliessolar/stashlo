<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stashlo POS - Merchant</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .app-header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: max(16px, env(safe-area-inset-top, 0px)) 16px 16px;
            position: relative;
            z-index: 10;
        }
        
        .app-header h1 { font-size: 24px; margin-bottom: 4px; }
        .app-header p { font-size: 12px; opacity: 0.9; }
        
        .bottom-nav {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            z-index: 99999 !important;
            background: white;
            border-top: 2px solid #eee;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            padding: 8px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
        }
        
        .nav-btn {
            background: none;
            border: none;
            padding: 8px 4px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            color: #667eea;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .nav-btn:active { background: #f0f0f0; }
        .nav-btn.active { background: #667eea; color: white; }
        
        .screen {
            display: none;
            padding: 16px;
            padding-top: 16px;
            padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));
            overflow-y: auto;
            max-height: calc(100vh - 100px - env(safe-area-inset-bottom, 0px));
        }
        
        .screen.active { display: block; }
        
        /* Till Styles */
        .shop-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .shop-info h2 { font-size: 20px; margin-bottom: 4px; }
        .shop-info p { font-size: 12px; opacity: 0.9; }
        
        .shop-selector-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .cat-btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
        }
        
        .cat-btn:active { transform: scale(0.95); }
        .cat-btn.active { background: #FF6B35; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .product-card {
            border: 1px solid #ddd;
            padding: 8px;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .product-card:active { background: #f0f0f0; }
        .product-card h4 { font-size: 13px; margin-bottom: 4px; }
        .product-card .price { color: #667eea; font-size: 14px; font-weight: bold; margin-bottom: 6px; }
        .product-card .code { font-size: 11px; color: #999; margin-bottom: 6px; }
        .product-card input { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
        
        .basket-section {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            border: 2px solid #667eea;
        }
        
        .basket-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        
        .basket-total {
            margin-top: 12px;
            border-top: 2px solid #667eea;
            padding-top: 8px;
            font-weight: bold;
        }
        
        .total-line { display: flex; justify-content: space-between; margin: 4px 0; }
        .total-label { font-size: 16px; color: #667eea; }
        
        .checkout-btn {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        
        .settings-section { margin-top: 16px; }
        
        .setting-group {
            margin-bottom: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .setting-toggle {
            width: 100%;
            padding: 12px;
            background: #f5f5f5;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .setting-content { display: none; padding: 12px; background: white; }
        .setting-content.show { display: block; }
        
        .setting-content label { display: block; margin: 6px 0; cursor: pointer; font-size: 13px; }
        .setting-content input[type="text"],
        .setting-content input[type="number"],
        .setting-content textarea {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin: 4px 0 8px 0;
            font-size: 12px;
        }
        
        .save-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .shop-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9998;
            padding: 16px;
        }
        
        .shop-modal.show { display: flex; align-items: flex-end; }
        
        .shop-modal-content {
            background: white;
            width: 100%;
            border-radius: 12px 12px 0 0;
            padding: 16px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .shop-option {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>🏪 Stashlo POS v2</h1>
        <p id="header-info">Select a shop to start</p>
    </div>
    
    <!-- TILL SCREEN -->
    <div id="till-screen" class="screen active">
        <div class="shop-header">
            <div class="shop-info">
                <h2 id="shop-name">📍 Select Shop</h2>
                <p id="shop-type">-</p>
            </div>
            <button class="shop-selector-btn" onclick="openShopSelector()">Change</button>
        </div>
        
        <div id="shop-modal" class="shop-modal">
            <div class="shop-modal-content">
                <h3 style="margin-bottom: 16px;">Select Your Shop</h3>
                <button class="shop-option" onclick="loadShop('petrol_pump')" style="background: #FF6B35; color: white;">⛽ Petrol Pump</button>
                <button class="shop-option" onclick="loadShop('convenience')" style="background: #004E89; color: white;">🛒 Convenience Store</button>
                <button class="shop-option" onclick="loadShop('restaurant')" style="background: #F77F00; color: white;">🍔 Restaurant</button>
            </div>
        </div>
        
        <h3 style="margin-bottom: 8px; color: #333;">📂 Categories</h3>
        <div class="categories" id="categories"></div>
        
        <div id="products" style="display: none;">
            <h3 id="cat-title" style="margin-bottom: 8px; color: #667eea;"></h3>
            <div class="products-grid" id="products-grid"></div>
        </div>
        
        <div id="customer-section" style="background: #fff3cd; padding: 12px; border-radius: 6px; margin: 16px 0; display: none;">
            <strong>👤 Customer:</strong> <span id="customer-name">Not selected</span>
            <button onclick="resetCustomer()" style="float: right; background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer;">Clear</button>
        </div>
        
        <div class="basket-section">
            <h4>🛒 Basket <span id="item-count">(0)</span></h4>
            <div id="basket-items">No items yet</div>
            <div class="basket-total">
                <div class="total-line"><span>Subtotal:</span><span id="subtotal">£0.00</span></div>
                <div class="total-line" style="color: #ff9800;"><span>VAT:</span><span id="vat-amount">£0.00</span></div>
                <div class="total-line" style="color: #667eea; font-size: 16px;"><span>TOTAL:</span><span id="total">£0.00</span></div>
            </div>
            <button class="checkout-btn" onclick="checkout()">💳 Checkout</button>
            <button onclick="clearBasket()" style="width: 100%; padding: 8px; margin-top: 8px; background: #999; color: white; border: none; border-radius: 6px; cursor: pointer;">Clear All</button>
        </div>
        
        <div class="settings-section">
            <h3>⚙️ POS Settings</h3>
            
            <div class="setting-group">
                <button class="setting-toggle" onclick="toggleSetting('receipt')">🧾 Receipt Settings <span>▼</span></button>
                <div id="receipt-content" class="setting-content">
                    <label><input type="checkbox" id="show-vat" checked> Show VAT on receipt</label>
                    <label><input type="checkbox" id="email-receipt"> Email receipt to customer</label>
                    <label><input type="checkbox" id="print-receipt"> Print receipt</label>
                </div>
            </div>
            
            <div class="setting-group">
                <button class="setting-toggle" onclick="toggleSetting('payment')">💳 Payment Options <span>▼</span></button>
                <div id="payment-content" class="setting-content">
                    <label><input type="checkbox" id="cash-pay" checked> Cash</label>
                    <label><input type="checkbox" id="card-pay" checked> Card</label>
                    <label><input type="checkbox" id="mobile-pay"> Mobile Pay</label>
                </div>
            </div>
            
            <div class="setting-group">
                <button class="setting-toggle" onclick="toggleSetting('tax')">🔢 Tax Settings <span>▼</span></button>
                <div id="tax-content" class="setting-content">
                    <label>Default VAT Rate (%):</label>
                    <input type="number" id="vat-rate" value="20" min="0" max="100">
                    <label><input type="checkbox" id="show-tax-breakdown" checked> Show tax breakdown</label>
                </div>
            </div>
            
            <div class="setting-group">
                <button class="setting-toggle" onclick="toggleSetting('shop')">🏪 Shop Settings <span>▼</span></button>
                <div id="shop-content" class="setting-content">
                    <label>Shop Name:</label>
                    <input type="text" id="shop-name-input">
                    <label>Receipt Footer:</label>
                    <textarea id="receipt-footer" style="height: 60px;"></textarea>
                </div>
            </div>
            
            <button class="save-btn" onclick="saveSettings()">💾 Save Settings</button>
        </div>
    </div>
    
    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('till')">💳 Till</button>
        <button class="nav-btn" onclick="switchTab('scan')">📱 Scan</button>
        <button class="nav-btn" onclick="switchTab('stock')">📦 Stock</button>
        <button class="nav-btn" onclick="switchTab('chat')">💬 Chat</button>
        <button class="nav-btn" onclick="openMore()">⋯ More</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script>
        // Shop Products Database
        const SHOPS = {
            petrol_pump: {
                name: "Petrol Pump",
                type: "fuel_station",
                categories: {
                    fuels: { name: "Fuels", icon: "⛽", products: [
                        {id:"f1",name:"Petrol 95",price:1.35,unit:"L",vat:20},
                        {id:"f2",name:"Petrol 97",price:1.45,unit:"L",vat:20},
                        {id:"f3",name:"Diesel",price:1.40,unit:"L",vat:20},
                        {id:"f4",name:"E10",price:1.30,unit:"L",vat:20},
                        {id:"f5",name:"AdBlue",price:8.99,unit:"can",vat:20}
                    ]},
                    retail: { name: "Retail", icon: "🛒", subs: {
                        grocery: {name:"Grocery",icon:"🥬",products:[
                            {id:"gr1",name:"Milk 1L",price:1.50,vat:0},
                            {id:"gr2",name:"Bread",price:1.20,vat:0},
                            {id:"gr3",name:"Eggs",price:2.00,vat:0},
                            {id:"gr4",name:"Coffee",price:4.50,vat:0}
                        ]},
                        vapes: {name:"Vapes",icon:"💨",products:[
                            {id:"v1",name:"Vape 5000",price:12.99,vat:20},
                            {id:"v2",name:"Vape Liquid",price:8.99,vat:20},
                            {id:"v3",name:"Coils",price:5.99,vat:20},
                            {id:"v4",name:"Battery",price:7.99,vat:20}
                        ]},
                        tobacco: {name:"Tobacco",icon:"🚬",products:[
                            {id:"t1",name:"Cigarettes",price:8.50,vat:20},
                            {id:"t2",name:"Rolling Tobacco",price:12.99,vat:20},
                            {id:"t3",name:"Cigars",price:15.00,vat:20},
                            {id:"t4",name:"Pipe Tobacco",price:9.99,vat:20}
                        ]}
                    }}
                }
            },
            convenience: {
                name: "Convenience Store",
                type: "retail",
                categories: {
                    retail: {name:"Retail",icon:"🛒",subs:{
                        grocery: {name:"Grocery",icon:"🥬",products:[
                            {id:"gr1",name:"Milk",price:1.50,vat:0},
                            {id:"gr2",name:"Bread",price:1.20,vat:0},
                            {id:"gr3",name:"Juice",price:2.50,vat:0},
                            {id:"gr4",name:"Snacks",price:1.99,vat:20}
                        ]},
                        vapes: {name:"Vapes",icon:"💨",products:[
                            {id:"v1",name:"Vape Disposable",price:10.99,vat:20},
                            {id:"v2",name:"Vape Liquid",price:7.99,vat:20}
                        ]},
                        tobacco: {name:"Tobacco",icon:"🚬",products:[
                            {id:"t1",name:"Cigarettes Pack",price:8.50,vat:20},
                            {id:"t2",name:"Rolling Paper",price:2.99,vat:20}
                        ]}
                    }}
                }
            },
            restaurant: {
                name: "Restaurant",
                type: "food",
                categories: {
                    restaurants: {name:"Menu",icon:"🍔",subs:{
                        mains: {name:"Mains",icon:"🍽️",products:[
                            {id:"r1",name:"Burger",price:9.99,code:"BUR001",vat:20},
                            {id:"r2",name:"Pizza",price:12.99,code:"PIZ001",vat:20},
                            {id:"r3",name:"Chicken",price:10.99,code:"CHK001",vat:20},
                            {id:"r4",name:"Fish Chips",price:8.99,code:"FSH001",vat:20}
                        ]},
                        drinks: {name:"Drinks",icon:"🥤",products:[
                            {id:"d1",name:"Coke",price:2.50,code:"DRK001",vat:20},
                            {id:"d2",name:"Beer",price:4.50,code:"BER001",vat:20}
                        ]},
                        desserts: {name:"Desserts",icon:"🍰",products:[
                            {id:"ds1",name:"Cake",price:4.99,code:"CAK001",vat:20},
                            {id:"ds2",name:"Ice Cream",price:3.50,code:"ICE001",vat:20}
                        ]}
                    }}
                }
            }
        };
        
        let CURRENT_SHOP = null;
        let BASKET = [];
        let CUSTOMER = null;
        
        function openShopSelector() {
            document.getElementById('shop-modal').classList.add('show');
        }
        
        function loadShop(shopKey) {
            CURRENT_SHOP = SHOPS[shopKey];
            document.getElementById('shop-modal').classList.remove('show');
            document.getElementById('shop-name').textContent = CURRENT_SHOP.name;
            document.getElementById('shop-type').textContent = CURRENT_SHOP.type.toUpperCase();
            renderCategories();
        }
        
        function renderCategories() {
            let html = '';
            Object.keys(CURRENT_SHOP.categories).forEach(catKey => {
                let cat = CURRENT_SHOP.categories[catKey];
                html += '<button class="cat-btn" onclick="showCategory(\'' + catKey + '\')">' + cat.icon + ' ' + cat.name + '</button>';
            });
            document.getElementById('categories').innerHTML = html;
        }
        
        function showCategory(catKey) {
            let cat = CURRENT_SHOP.categories[catKey];
            document.getElementById('cat-title').textContent = cat.icon + ' ' + cat.name;
            
            let html = '';
            if(cat.subs) {
                Object.keys(cat.subs).forEach(subKey => {
                    let sub = cat.subs[subKey];
                    html += '<div style="margin-bottom: 16px;"><h4 style="background: #f0f0f0; padding: 8px; border-radius: 4px; margin-bottom: 8px;">' + sub.icon + ' ' + sub.name + '</h4><div class="products-grid">';
                    sub.products.forEach(p => {
                        html += '<div class="product-card" onclick="addToBasket(\'' + p.id + '\',\'' + p.name + '\',' + p.price + ',' + p.vat + ')"><h4>' + p.name + '</h4><div class="price">£' + p.price.toFixed(2) + (p.unit ? '/' + p.unit : '') + '</div>' + (p.code ? '<div class="code">' + p.code + '</div>' : '') + '<input type="number" id="qty-' + p.id + '" value="1" min="1" placeholder="Qty"></div>';
                    });
                    html += '</div></div>';
                });
            } else {
                cat.products.forEach(p => {
                    html += '<div class="product-card" onclick="addToBasket(\'' + p.id + '\',\'' + p.name + '\',' + p.price + ',' + p.vat + ')"><h4>' + p.name + '</h4><div class="price">£' + p.price.toFixed(2) + (p.unit ? '/' + p.unit : '') + '</div>' + (p.code ? '<div class="code">' + p.code + '</div>' : '') + '<input type="number" id="qty-' + p.id + '" value="1" min="1" placeholder="Qty"></div>';
                });
            }
            document.getElementById('products-grid').innerHTML = html;
            document.getElementById('products').style.display = 'block';
        }
        
        function addToBasket(id, name, price, vat) {
            let qty = parseInt(document.getElementById('qty-' + id).value) || 1;
            let item = {id, name, price, qty, vat, net: price*qty, vat_amt: (price*qty*vat/100), total: (price*qty)+(price*qty*vat/100)};
            BASKET.push(item);
            updateBasket();
            alert('✅ Added: ' + name + ' x' + qty);
        }
        
        function updateBasket() {
            let net = BASKET.reduce((s, i) => s + i.net, 0);
            let vat = BASKET.reduce((s, i) => s + i.vat_amt, 0);
            let total = net + vat;
            
            let html = '';
            BASKET.forEach((item, idx) => {
                html += '<div class="basket-item"><div>' + item.name + ' x' + item.qty + '</div><div>£' + item.total.toFixed(2) + ' <button onclick="removeItem(' + idx + ')" style="margin-left: 8px; background: #e74c3c; color: white; border: none; padding: 2px 6px; border-radius: 3px; cursor: pointer; font-size: 11px;">✕</button></div></div>';
            });
            
            document.getElementById('basket-items').innerHTML = html || 'No items yet';
            document.getElementById('item-count').textContent = '(' + BASKET.length + ')';
            document.getElementById('subtotal').textContent = '£' + net.toFixed(2);
            document.getElementById('vat-amount').textContent = '£' + vat.toFixed(2);
            document.getElementById('total').textContent = '£' + total.toFixed(2);
        }
        
        function removeItem(idx) {
            BASKET.splice(idx, 1);
            updateBasket();
        }
        
        function clearBasket() {
            BASKET = [];
            updateBasket();
        }
        
        function checkout() {
            if(BASKET.length === 0) {
                alert('Basket is empty!');
                return;
            }
            let total = BASKET.reduce((s, i) => s + i.total, 0);
            alert('✅ Payment of £' + total.toFixed(2) + ' processed!\n\nReceipt saved.');
            BASKET = [];
            updateBasket();
        }
        
        function toggleSetting(setting) {
            let content = document.getElementById(setting + '-content');
            let toggle = event.target.querySelector('span');
            content.classList.toggle('show');
            toggle.textContent = content.classList.contains('show') ? '▲' : '▼';
        }
        
        function saveSettings() {
            let settings = {
                show_vat: document.getElementById('show-vat').checked,
                email: document.getElementById('email-receipt').checked,
                print: document.getElementById('print-receipt').checked,
                vat_rate: parseInt(document.getElementById('vat-rate').value),
                shop_name: document.getElementById('shop-name-input').value,
                footer: document.getElementById('receipt-footer').value
            };
            localStorage.setItem('pos_settings', JSON.stringify(settings));
            alert('✅ Settings saved!');
        }
        
        function switchTab(tab) {
            // Currently only till implemented
            if(tab === 'till') document.getElementById('till-screen').classList.add('active');
        }
        
        function openMore() {
            alert('More options coming soon!');
        }
        
        function resetCustomer() {
            CUSTOMER = null;
            document.getElementById('customer-section').style.display = 'none';
        }
        
        // Initialize
        window.addEventListener('load', function() {
            updateBasket();
        });
    </script>
</body>
</html>
