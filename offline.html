<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stashlo — Offline</title>
<style>
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1e1b4b;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;text-align:center;padding:20px}
  .icon{font-size:64px;margin-bottom:20px}
  h1{font-size:24px;font-weight:800;margin:0 0 10px;background:linear-gradient(120deg,#a5b4fc,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  p{color:rgba(255,255,255,.7);font-size:15px;max-width:280px;line-height:1.6}
  button{margin-top:24px;background:#6366F1;color:#fff;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
  <div class="icon">💜</div>
  <h1>You're offline</h1>
  <p>Your loyalty cards are saved and ready. Connect to the internet to sync your points and rewards.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
