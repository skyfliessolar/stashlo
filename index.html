<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a14">
<title>Stashlo — Smart Loyalty Wallet [DEBUG]</title>
<style>
:root{--bg:#f0efff;--dk:#0a0a14;--wh:#fff;--pu:#6C5CE7;--pu2:#ece9ff;--gn:#00897B;--tx:#1a1a2e;--mu:#706f87;--fn:system-ui,-apple-system,'Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--fn)}
body{background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;outline:none}
input{outline:none;-webkit-appearance:none}
#splash{position:fixed;inset:0;background:var(--dk);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:9999}
#auth{display:none;min-height:100vh;background:var(--dk);align-items:center;justify-content:center;padding:20px}
.a-box{background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:380px}
.a-box input{width:100%;padding:13px 14px;border:1.5px solid #e5e5ea;border-radius:12px;font-size:15px;margin-bottom:10px}
.a-box button{width:100%;padding:13px;background:var(--dk);color:#fff;border-radius:12px;font-size:15px;font-weight:700;margin-top:10px}
#app{display:none;flex-direction:column;min-height:100vh;padding-bottom:72px}
.topbar{background:var(--dk);padding:13px 18px;color:#fff;font-weight:800}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ebebef;display:flex;z-index:100}
.nv{flex:1;padding:9px;text-align:center;font-size:10px;cursor:pointer;color:var(--mu)}
.nv.on{color:var(--pu);font-weight:700}
.scr{display:none;padding:16px}.scr.on{display:block}
.hero{background:var(--dk);border-radius:20px;padding:20px 18px;margin-bottom:16px;color:#fff}
.hst{background:rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;flex:1;display:inline-block}
.sr{display:flex;justify-content:space-between;align-items:center;margin:18px 0 11px}
.cscroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px}
.lcard{min-width:180px;border-radius:16px;padding:16px;flex-shrink:0;cursor:pointer;color:#fff;transform:perspective(1000px) rotateY(-5deg);transition:transform 0.3s}
.lcard:active{transform:perspective(1000px) rotateY(-2deg)}
.cfl{border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;color:#fff;transform:perspective(1000px) rotateY(-3deg);transition:transform 0.3s}
.empty{text-align:center;padding:36px 16px;color:var(--mu)}
#add-sheet{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.sheet{background:#fff;border-radius:24px 24px 0 0;padding:24px 18px;width:100%;max-height:90vh;overflow-y:auto}
.sheet input{width:100%;padding:11px 12px;border:1px solid #e5e5ea;border-radius:10px;font-size:14px;margin-bottom:10px}
.sheet label{display:block;font-size:11px;font-weight:700;color:var(--mu);margin-bottom:4px;text-transform:uppercase}
.sheet button{width:100%;padding:12px;background:var(--dk);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:600;margin:10px 0}
.sheet .back{background:#f0f0f0;color:var(--mu)}
.sheet .loc{background:var(--gn);margin:8px 0}
.topt{padding:10px;background:#f9f9fb;border-radius:10px;border:1.5px solid transparent;cursor:pointer;text-align:center;margin:5px}
.topt.on{background:var(--pu2);border-color:var(--pu)}
.brand{background:#f9f9fb;border-radius:10px;padding:10px;text-align:center;cursor:pointer;margin:5px;font-size:12px}
#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s}
#toast.on{opacity:1}
#card-detail{position:fixed;inset:0;background:var(--dk);z-index:150;display:none;flex-direction:column;color:#fff;overflow-y:auto}
.cd-header{padding:20px;flex-shrink:0}
.cd-body{background:#fff;border-radius:24px 24px 0 0;flex:1;padding:20px;color:var(--tx)}
.cd-info{background:#f9f9fb;border-radius:10px;padding:12px;margin-bottom:10px;font-size:13px}
.cd-info-lbl{color:var(--mu);font-weight:700;font-size:11px;text-transform:uppercase}
.cd-info-val{color:var(--tx);font-weight:700;margin-top:4px}
.err{background:#ffebee;color:#c62828;padding:10px;border-radius:8px;font-size:12px;margin-top:10px}
</style>
</head>
<body>

<div id="splash">
  <div style="font-size:40px;font-weight:800;color:#fff">Stash<span style="color:var(--pu)">lo</span></div>
  <div style="color:var(--pu);text-align:center">
    <div>Loading...</div>
    <div style="font-size:11px;color:#fff;margin-top:10px" id="debug-splash"></div>
  </div>
</div>

<div id="auth">
  <div class="a-box">
    <div style="font-size:18px;font-weight:800;margin-bottom:20px">Stashlo</div>
    <div style="margin-bottom:20px" id="auth-form">
      <div style="font-size:14px;font-weight:700;margin-bottom:5px">Email</div>
      <input type="email" id="in-e" placeholder="you@email.com">
      <div style="font-size:14px;font-weight:700;margin-bottom:5px;margin-top:10px">Password</div>
      <input type="password" id="in-p" placeholder="Password">
      <button onclick="handleSignIn()">Sign in</button>
      <div id="err" style="color:#c62828;font-size:12px;margin-top:10px"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">Stash<span style="color:var(--pu)">lo</span></div>
  <div class="scr on" id="scr-home">
    <div class="hero">
      <div style="color:rgba(255,255,255,.4);font-size:12px">Good morning</div>
      <div style="font-size:18px;font-weight:800;margin:8px 0" id="hn">Your wallet</div>
      <div style="display:flex;gap:10px">
        <div class="hst"><div style="font-size:18px;font-weight:800" id="s-c">0</div><div style="font-size:11px;color:rgba(255,255,255,.4)">Cards</div></div>
        <div class="hst"><div style="font-size:18px;font-weight:800" id="s-p">0</div><div style="font-size:11px;color:rgba(255,255,255,.4)">Points</div></div>
      </div>
    </div>
    <div class="sr"><div style="font-size:14px;font-weight:700">My cards</div></div>
    <div class="cscroll" id="h-cards"><div style="background:#fff;border-radius:12px;padding:15px;text-align:center;color:var(--mu);font-size:12px;flex-shrink:0;width:150px">Tap + to add</div></div>
  </div>
  <div class="scr" id="scr-cards">
    <div class="sr"><div style="font-size:14px;font-weight:700">My cards</div><button onclick="oAS()" style="background:var(--pu2);color:var(--pu);width:36px;height:36px;border-radius:8px;cursor:pointer">+</button></div>
    <div id="cards-list"></div>
  </div>
  <nav class="nav">
    <div class="nv on" onclick="go('home')">🏠 Home</div>
    <div class="nv" onclick="go('cards')">💳 Cards</div>
  </nav>
</div>

<div id="card-detail">
  <div class="cd-header">
    <button onclick="closeCD()" style="background:rgba(255,255,255,.1);color:#fff;padding:8px 12px;border-radius:8px;margin-bottom:15px">← Back</button>
    <div style="color:rgba(255,255,255,.5);font-size:13px" id="cd-shop"></div>
    <div style="font-size:50px;font-weight:800;margin:10px 0" id="cd-pts">0</div>
    <div style="color:rgba(255,255,255,.5);font-size:13px">points</div>
  </div>
  <div class="cd-body">
    <div class="cd-info"><div class="cd-info-lbl">Visits</div><div class="cd-info-val" id="cd-visits">0</div></div>
    <div class="cd-info"><div class="cd-info-lbl">Total spent</div><div class="cd-info-val" id="cd-spent">£0</div></div>
    <div class="cd-info"><div class="cd-info-lbl">Rewards</div><div class="cd-info-val" id="cd-rewards">0</div></div>
    <div class="cd-info"><div class="cd-info-lbl">Card Number</div><div class="cd-info-val" id="cd-cardnum">****</div></div>
    <div class="cd-info"><div class="cd-info-lbl">Store Location</div><div class="cd-info-val" id="cd-store">—</div></div>
    <div class="cd-info"><div class="cd-info-lbl">Order Reference</div><div class="cd-info-val" id="cd-order">—</div></div>
  </div>
</div>

<div id="add-sheet" onclick="if(event.target===this)cAS()">
  <div class="sheet">
    <div style="font-size:16px;font-weight:800;margin-bottom:15px">Add card</div>
    <div id="step-type">
      <button class="topt on" onclick="sAT('national')">🇬🇧 National Brands</button>
    </div>
    <div id="step-national" style="display:none">
      <div id="brg" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px"></div>
      <button class="back" onclick="sAT('type')">← Back</button>
    </div>
    <div id="step-card-details" style="display:none">
      <div style="background:#f9f9fb;border-radius:10px;padding:12px;margin-bottom:12px">
        <div id="card-preview-emoji" style="font-size:28px;margin-bottom:8px"></div>
        <div id="card-preview-name" style="font-weight:700;font-size:13px"></div>
      </div>
      
      <label>Card Number ★</label>
      <input type="text" id="nat-card-num" placeholder="1234567890">
      
      <label>Order Reference</label>
      <input type="text" id="nat-card-order" placeholder="ORDER-12345">
      
      <label>Store Location</label>
      <input type="text" id="nat-card-store" placeholder="London Branch">
      
      <label>Name</label>
      <input type="text" id="nat-card-holder" placeholder="Your name">
      
      <button class="loc" onclick="captureLocation()">📍 Capture Location</button>
      <div id="loc-status" style="text-align:center;font-size:11px;color:var(--mu);height:16px"></div>
      
      <button onclick="saveNatCard()">✓ Save</button>
      <button class="back" onclick="sAT('national')">← Back</button>
      <div id="card-err" class="err" style="display:none"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
console.log('🔴 STASHLO DEBUG VERSION LOADING...');

var SURL='https://gcwevgaymahywqjorhnn.supabase.co';
var SKEY='sb_publishable_Ow8CKO5ZFY_nOkjmqWUMeA_10jQkBe_';
var TOKEN=null,UID=null,PROF={},CARDS=[];
var CURNAT={},CURCARD=null,tmpLat=null,tmpLng=null;

var NB=[
  {id:'tesco',n:'Tesco',e:'🛒',c:'#00539B'},
  {id:'nectar',n:'Nectar',e:'🎯',c:'#FF6600'},
  {id:'boots',n:'Boots',e:'💊',c:'#00A3AD'},
  {id:'costa',n:'Costa',e:'☕',c:'#622F22'},
  {id:'bp',n:'BP',e:'⛽',c:'#009A44'},
  {id:'greggs',n:'Greggs',e:'🥐',c:'#002E5B'},
  {id:'mcdonalds',n:"McDonald's",e:'🍟',c:'#DA291C'},
  {id:'starbucks',n:'Starbucks',e:'☕',c:'#00704A'},
  {id:'waterstones',n:'Waterstones',e:'📚',c:'#1B365D'},
  {id:'johnlewis',n:'John Lewis',e:'🏬',c:'#3D3D3D'},
  {id:'ikea',n:'IKEA',e:'🛋️',c:'#0058A3'},
  {id:'lidl',n:'Lidl',e:'🛍️',c:'#0050AA'},
  {id:'asda',n:'Asda',e:'🛒',c:'#78BE20'},
  {id:'morrisons',n:'Morrisons',e:'🛒',c:'#F5A623'},
  {id:'waitrose',n:'Waitrose',e:'🥬',c:'#2d2d2d'},
  {id:'nandos',n:"Nando's",e:'🍗',c:'#BE0000'},
  {id:'pizza',n:'Pizza',e:'🍕',c:'#D72027'},
  {id:'odeon',n:'ODEON',e:'🎬',c:'#E20714'},
  {id:'vue',n:'Vue',e:'🎭',c:'#1B1464'},
  {id:'cineworld',n:'Cineworld',e:'🎬',c:'#C41230'}
];

log('✓ Globals initialized');
log('✓ 20 brands loaded');

function log(msg){
  console.log(msg);
  var splash=document.getElementById('debug-splash');
  if(splash){
    splash.innerHTML=splash.innerHTML+msg+'<br>';
    splash.scrollTop=splash.scrollHeight;
  }
}

setTimeout(function(){
  log('→ Checking session...');
  try{
    if(checkSess()){
      log('✓ Session found');
      hide('splash');
      show('app');
      loadProf();
      loadCards();
    }else{
      log('→ No session, showing login');
      hide('splash');
      show('auth');
    }
  }catch(e){
    log('✗ Error: '+e.message);
    hide('splash');
    show('auth');
  }
},1000);

window.handleSignIn=function(){
  var e=document.getElementById('in-e').value.trim();
  var p=document.getElementById('in-p').value;
  var err=document.getElementById('err');
  err.style.display='none';
  if(!e||!p){err.textContent='Enter email and password';err.style.display='block';return;}
  log('→ Signing in...');
  fetch(SURL+'/auth/v1/token?grant_type=password',{
    method:'POST',
    headers:{'apikey':SKEY,'Content-Type':'application/json'},
    body:JSON.stringify({email:e,password:p})
  }).then(r=>r.json()).then(d=>{
    if(!d.access_token){err.textContent='Wrong email or password';err.style.display='block';return;}
    TOKEN=d.access_token;
    UID=d.user.id;
    saveSess(TOKEN,UID,e);
    log('✓ Signed in');
    hide('auth');
    show('app');
    loadProf();
    loadCards();
  }).catch(e=>{err.textContent='Error: '+e.message;err.style.display='block';log('✗ '+e.message);});
};

function loadProf(){
  if(!UID)return;
  log('→ Loading profile...');
  fetch(SURL+'/rest/v1/users?id=eq.'+UID+'&select=*',{headers:{apikey:SKEY}}).then(r=>r.json()).then(d=>{
    PROF=Array.isArray(d)?d[0]:{};
    var nm=PROF.name||'there';
    document.getElementById('hn').textContent=nm+"'s wallet";
    log('✓ Profile loaded: '+nm);
  }).catch(e=>log('✗ Profile error: '+e.message));
}

function loadCards(){
  if(!UID){log('✗ No UID');return;}
  log('→ Loading cards...');
  fetch(SURL+'/rest/v1/cards?user_id=eq.'+UID+'&order=addedAt.desc',{headers:{apikey:SKEY}}).then(r=>r.json()).then(d=>{
    CARDS=Array.isArray(d)?d:[];
    log('✓ Cards loaded: '+CARDS.length);
    renderCards();
  }).catch(e=>{log('✗ Cards error: '+e.message);renderCards();});
}

function renderCards(){
  log('→ Rendering '+CARDS.length+' cards');
  var hc=document.getElementById('h-cards');
  if(!CARDS.length){hc.innerHTML='<div style="background:#fff;border-radius:12px;padding:15px;text-align:center;color:var(--mu);flex-shrink:0;width:150px;font-size:12px">Tap + to add</div>';}else{hc.innerHTML=CARDS.slice(0,4).map(c=>'<div class="lcard" style="background:'+c.color+'" onclick="oCD(\''+c.id+'\')"><div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px">'+c.shopName+'</div><div style="font-size:24px;font-weight:800">'+(c.points||0)+'</div><div style="font-size:10px;color:rgba(255,255,255,.4)">pts</div></div>').join('');}
  var cl=document.getElementById('cards-list');
  if(!CARDS.length){cl.innerHTML='<div class="empty"><div style="font-size:32px;margin-bottom:10px">💳</div><p>No cards<br>Tap + to add</p></div>';}else{cl.innerHTML=CARDS.map(c=>'<div class="cfl" style="background:'+c.color+'" onclick="oCD(\''+c.id+'\')"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div style="font-size:13px;font-weight:700">'+c.shopName+'</div><div style="font-size:10px;background:rgba(255,255,255,.2);padding:3px 6px;border-radius:12px">'+(c.type==='national'?'🇬🇧':'🏪')+'</div></div><div style="font-size:28px;font-weight:800">'+(c.points||0)+'</div></div>').join('');}
  document.getElementById('s-c').textContent=CARDS.length;
  document.getElementById('s-p').textContent=CARDS.reduce((a,c)=>a+(c.points||0),0);
  log('✓ Rendered');
}

window.oCD=function(id){
  CURCARD=CARDS.find(c=>c.id===id);
  if(!CURCARD)return;
  log('→ Opening card: '+CURCARD.shopName);
  show('card-detail');
  document.getElementById('cd-shop').textContent=CURCARD.shopName;
  document.getElementById('cd-pts').textContent=CURCARD.points||0;
  document.getElementById('cd-visits').textContent=CURCARD.visitCount||0;
  document.getElementById('cd-spent').textContent='£'+((CURCARD.totalSpend||0)).toFixed(0);
  document.getElementById('cd-rewards').textContent=CURCARD.rewardsRedeemed||0;
  document.getElementById('cd-cardnum').textContent=CURCARD.cardNumber?'****'+CURCARD.cardNumber.slice(-4):'****';
  document.getElementById('cd-store').textContent=CURCARD.storeLocation||'—';
  document.getElementById('cd-order').textContent=CURCARD.orderRef||'—';
};

window.closeCD=function(){hide('card-detail');CURCARD=null;};

window.oAS=function(){log('→ Opening add sheet');sAT('national');show('add-sheet');};
window.cAS=function(){log('→ Closing add sheet');hide('add-sheet');document.getElementById('nat-card-num').value='';document.getElementById('nat-card-order').value='';document.getElementById('nat-card-store').value='';document.getElementById('nat-card-holder').value='';document.getElementById('loc-status').textContent='';document.getElementById('card-err').style.display='none';CURNAT={};tmpLat=null;tmpLng=null;sAT('type');};

window.sAT=function(t){
  log('→ Step: '+t);
  hide('step-type');hide('step-national');hide('step-card-details');
  if(t==='type')show('step-type');
  if(t==='national'){show('step-national');bBrands();}
};

function bBrands(){
  var el=document.getElementById('brg');
  el.innerHTML=NB.map(b=>'<div class="brand" onclick="selectNatBrand(\''+b.id+'\',\''+b.n.replace(/'/g,"\\'")+'\',\''+b.e+'\',\''+b.c+'\')"><div style="font-size:22px;margin-bottom:4px">'+b.e+'</div><div style="font-size:10px">'+b.n+'</div></div>').join('');
}

window.selectNatBrand=function(id,name,emoji,color){
  if(!UID){toast('Sign in first');return;}
  if(CARDS.find(c=>c.id===id)){toast('Already added!');return;}
  log('→ Selected: '+name);
  CURNAT={id,name,emoji,color};
  document.getElementById('card-preview-emoji').textContent=emoji;
  document.getElementById('card-preview-name').textContent=name;
  document.getElementById('nat-card-num').value='';
  document.getElementById('nat-card-order').value='';
  document.getElementById('nat-card-store').value='';
  document.getElementById('nat-card-holder').value='';
  document.getElementById('loc-status').textContent='';
  hide('step-national');
  show('step-card-details');
};

window.captureLocation=function(){
  if(!navigator.geolocation){document.getElementById('loc-status').textContent='Not supported';return;}
  log('→ Capturing location...');
  document.getElementById('loc-status').textContent='📍 Locating...';
  navigator.geolocation.getCurrentPosition(
    function(pos){
      tmpLat=pos.coords.latitude;
      tmpLng=pos.coords.longitude;
      document.getElementById('loc-status').textContent='✓ '+tmpLat.toFixed(4)+', '+tmpLng.toFixed(4);
      log('✓ Location: '+tmpLat+', '+tmpLng);
    },
    function(err){
      document.getElementById('loc-status').textContent='✗ '+err.message;
      log('✗ Geolocation error: '+err.message);
    }
  );
};

window.saveNatCard=function(){
  var num=document.getElementById('nat-card-num').value.trim();
  var order=document.getElementById('nat-card-order').value.trim();
  var store=document.getElementById('nat-card-store').value.trim();
  var holder=document.getElementById('nat-card-holder').value.trim();
  var err=document.getElementById('card-err');
  err.style.display='none';
  
  if(!num||num.length<4){err.textContent='Card number required (4+ digits)';err.style.display='block';return;}
  
  log('→ Saving: '+CURNAT.name);
  fetch(SURL+'/rest/v1/cards',{
    method:'POST',
    headers:{apikey:SKEY,'Content-Type':'application/json'},
    body:JSON.stringify({user_id:UID,id:CURNAT.id,name:CURNAT.name,shopName:CURNAT.name,emoji:CURNAT.emoji,color:CURNAT.color,type:'national',points:0,threshold:500,addedAt:Date.now(),visitCount:0,totalSpend:0,rewardsRedeemed:0,cardNumber:num,cardHolder:holder||null,orderRef:order||null,storeLocation:store||null,latitude:tmpLat,longitude:tmpLng})
  }).then(r=>r.json()).then(d=>{
    log('✓ Saved to Supabase');
    toast('✅ '+CURNAT.name+' added!');
    window.cAS();
    loadCards();
  }).catch(e=>{err.textContent='Error: '+e.message;err.style.display='block';log('✗ '+e.message);});
};

window.go=function(s){
  log('→ Go to: '+s);
  document.querySelectorAll('.scr').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nv').forEach(x=>x.classList.remove('on'));
  var scr=document.getElementById('scr-'+s);
  var nv=document.querySelector('.nv:nth-child('+(s==='home'?1:2)+')');
  if(scr)scr.classList.add('on');
  if(nv)nv.classList.add('on');
};

function show(id){var e=document.getElementById(id);if(e)e.style.display=e.id==='add-sheet'?'flex':'block';}
function hide(id){var e=document.getElementById(id);if(e)e.style.display='none';}
function saveSess(token,uid,email){localStorage.setItem('sl_s',JSON.stringify({t:token,uid:uid,email:email||'',x:Date.now()+3600000}));}
function checkSess(){try{var s=JSON.parse(localStorage.getItem('sl_s')||'null');if(s&&s.t&&s.uid&&s.x>Date.now()){TOKEN=s.t;UID=s.uid;return s.email||s.uid;}}catch(e){}clearSess();return false;}
function clearSess(){localStorage.removeItem('sl_s');TOKEN=null;UID=null;PROF={};CARDS=[];}
var TT;function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(TT);TT=setTimeout(()=>t.classList.remove('on'),2800);}

log('✓ ALL CODE LOADED');
log('✓ Ready to test');

</script>
</body>
</html>
